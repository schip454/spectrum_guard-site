name: E2E Tests

# Прогон Playwright/Chromium на ubuntu-раннере (там есть системные библиотеки браузера).
# Тестирует собранную статику через astro preview (база '/'). Артефакт — HTML-отчёт.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers + system deps
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
