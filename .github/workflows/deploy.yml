name: Build & Deploy

# Сборка Astro и заливка dist/ на шаред-хостинг reg.ru по FTP/SFTP.
# Секреты (Settings → Secrets → Actions): FTP_SERVER, FTP_USERNAME, FTP_PASSWORD,
# и при необходимости FTP_SERVER_DIR (путь на хостинге, напр. /public_html/).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # Деплой включается автоматически, как только заданы FTP-секреты. До этого —
      # шаг пропускается, workflow остаётся зелёным (см. README → деплой).
      - name: Check FTP secrets
        id: ftp
        run: |
          if [ -n "${{ secrets.FTP_SERVER }}" ]; then echo "ready=true" >> "$GITHUB_OUTPUT"; else echo "ready=false" >> "$GITHUB_OUTPUT"; echo '::notice::FTP secrets not set — skipping reg.ru deploy.'; fi

      - name: Deploy to reg.ru via FTP
        if: steps.ftp.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/public_html/' }}
          local-dir: ./dist/
          # НЕ удалять серверный секрет обработчика заявок при синхронизации.
          exclude: |
            **/lead.config.php
            **/.git*
            **/node_modules/**
